# ============================================================
# Semantic Consistency Check Rules (v0.4)
# Beyond field counting — semantic cross-validation across all outputs.
# ============================================================

consistency_rules:
  # --- Cross-file count consistency ---
  - id: CS-COUNT-POC
    description: "PoC count must be internally consistent"
    check: >
      poc_summary.meta.total_pocs == len(poc_summary.poc_results)
      AND poc_summary.meta.executed <= poc_summary.meta.total_pocs
    severity: HARD_FAIL

  - id: CS-COUNT-CLASSIFICATION
    description: "Classification counts must match across all files"
    check: >
      threat_list.summary.by_classification.confirmed == len(confirmed_findings.findings)
      AND threat_list.summary.by_classification.partial == len(candidate_findings.findings)
      AND threat_list.summary.by_classification.design == len(design_gaps.findings)
      AND threat_list.summary.by_classification.false_positive == len(false_positives.findings)
    severity: HARD_FAIL

  - id: CS-COUNT-STANDARD
    description: "Total must decompose correctly"
    check: >
      threat_list.summary.total_threats == len(threat_list.threats)
      AND len(threat_list.threats) == (
        len(confirmed_findings.findings) +
        len(candidate_findings.findings) +
        len(design_gaps.findings) +
        len(out_of_scope.findings) +
        len(false_positives.findings)
      )
    severity: HARD_FAIL

  # --- Must-detect precise coverage ---
  - id: CS-MUST-DETECT-COVERAGE
    description: "Every must_detect entry must have a precisely matched finding"
    check: >
      For each must_detect in regression_corpus_v2:
        EXISTS threat WHERE (
          threat.file ENDSWITH must_detect.matching.file_suffix
          AND estimated_line IN must_detect.matching.line_range
          AND threat.final_classification == must_detect.correct_classification
        )
      IF NOT → FAIL with "must_detect_miss: {must_detect.threat_id}"
    severity: HARD_FAIL

  - id: CS-MUST-DETECT-MISMATCH
    description: "Matched must_detect must have correct classification"
    check: >
      For each matched must_detect:
        matched_threat.final_classification == must_detect.correct_classification
      IF NOT → FAIL with "must_detect_classification_mismatch: expected {expected}, got {actual}"
    severity: HARD_FAIL

  # --- Must-reject enforcement ---
  - id: CS-MUST-REJECT-ENFORCED
    description: "No finding should violate must_reject patterns"
    check: >
      For each must_reject pattern:
        For each threat WHERE threat.(name+description) CONTAINS pattern.trigger.finding_keywords:
          threat.final_classification == pattern.action.force_classification
          AND threat.fp_code_ref == pattern.pattern_id
      IF NOT → FAIL with "must_reject_violation: {threat.id} should be {pattern.action.force_classification}"
    severity: HARD_FAIL

  # --- Confirmed gate enforcement ---
  - id: CS-CONFIRMED-GATES
    description: "All confirmed threats must pass hard gates"
    checks:
      - "No confirmed threat with preconditions containing [root, local_fs_write, system_partition_write]"
      - "No confirmed threat with exploit_path_type != direct"
      - "No confirmed HIGH threat with impact_observed == false"
      - "No confirmed threat with attacker_control == none"
    severity: HARD_FAIL

  # --- PoC evidence consistency ---
  - id: CS-POC-EVIDENCE
    description: "Confirmed threats must have PoC coverage justification"
    check: >
      For each confirmed threat:
        IF no PoC entry exists in poc_summary:
          threat MUST have explicit field "why_confirmed_without_poc"
        IF PoC entry is runtime_model_poc:
          threat confidence MUST be <= 7
        IF PoC entry is static_evidence:
          threat confidence MUST be <= 5
    severity: HARD_FAIL

  # --- PoC claim accuracy ---
  - id: CS-POC-CLAIMS
    description: "PoC claims must match evidence tier"
    check: >
      For each PoC entry in poc_summary:
        IF poc_type == runtime_model_poc:
          observation MUST NOT contain ["fully verified", "PoC 有效验证漏洞", "exploit confirmed"]
        IF poc_type == static_evidence:
          observation MUST NOT contain ["verified", "confirmed", "有效验证"]
    severity: HARD_FAIL

  # --- HIGH severity confirmed requires runtime PoC ---
  - id: CS-HIGH-CONFIRMED-POC
    description: "HIGH severity confirmed threats should have runtime PoC"
    check: >
      For each confirmed threat WHERE severity == HIGH:
        EXISTS PoC entry WHERE poc_type == runtime_target_poc
      IF NOT → WARN "HIGH confirmed without runtime_target_poc: {threat.id}"
    severity: SOFT_WARN

  # --- Attacker capability consistency ---
  - id: CS-ATTACKER-CAPABILITY
    description: "Threat preconditions must be consistent with attacker model"
    check: >
      For each threat:
        IF threat.preconditions CONTAINS capability WHERE
           attacker_capabilities[capability] == false:
          threat.final_classification in [design, out_of_scope]
      IF NOT → FAIL with "threat exceeds attacker model: {threat.id} requires {capability}"
    severity: HARD_FAIL

  # --- SAST cross-reference ---
  - id: CS-SAST-REFERENCE
    description: "SAST-referenced threat IDs must exist"
    check: >
      All threat_ids in sast_verification.log EXIST in threat_list.threats[].id
      AND All threat_ids in attack_pattern_map.mappings[].threat_id EXIST in threat_list.threats[].id
    severity: HARD_FAIL

  # --- HTML rendering consistency ---
  - id: CS-HTML-CONSISTENCY
    description: "HTML report must match canonical data"
    check: >
      HTML summary.total == len(threat_list.threats)
      AND HTML confirmed count == len(confirmed_findings.findings)
      AND HTML candidate count == len(candidate_findings.findings)
      AND HTML design count == len(design_gaps.findings)
      AND HTML fp count == len(false_positives.findings)
    severity: HARD_FAIL

  # --- FP rationale must contain threat name keywords ---
  - id: CS-FP-RATIONALE
    description: "FP rationale must be semantically relevant"
    check: >
      For each false_positive threat:
        threat.fp_rationale CONTAINS at least 2 keywords from threat.name
      IF NOT → WARN "FP rationale may not match threat: {threat.id}"
    severity: SOFT_WARN

# ============================================================
# Run order matters — hard fails first
# ============================================================
run_order:
  - CS-COUNT-POC
  - CS-COUNT-CLASSIFICATION
  - CS-COUNT-STANDARD
  - CS-MUST-DETECT-COVERAGE
  - CS-MUST-DETECT-MISMATCH
  - CS-MUST-REJECT-ENFORCED
  - CS-CONFIRMED-GATES
  - CS-ATTACKER-CAPABILITY
  - CS-POC-EVIDENCE
  - CS-POC-CLAIMS
  - CS-SAST-REFERENCE
  - CS-HTML-CONSISTENCY
  - CS-HIGH-CONFIRMED-POC
  - CS-FP-RATIONALE

fail_policy:
  any_hard_fail: "禁止输出最终报告，修正后重试（最多 3 次迭代）"
  soft_warn_only: "允许输出报告，但必须在报告中包含警告章节"
