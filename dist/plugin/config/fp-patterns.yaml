# ============================================================
# False Positive Pattern Repository
# Known patterns that cause false positives in STRIDE analysis
# Each pattern has a rule and trigger conditions
# ============================================================

fp_patterns:

  - id: FP-AUTH-MIDSTEP
    name: "Intermediate auth step mistaken for final verification"
    description: >
      Authentication threats must trace to the final signature/MAC/PAKE
      verification step. Stopping at intermediate steps (e.g., JSON parsing,
      message deserialization, protocol header extraction) produces false positives.
    rule: >
      An auth bypass claim is only valid if the call chain reaches the final
      cryptographic verification step (signature check, MAC comparison, PAKE
      key confirmation). If the threat stops at protocol parsing or message
      formatting, it is a false positive.
    examples:
      - "JSON auth message can be modified" → FP: the actual auth check is at the signature verification step after JSON parse
      - "Protocol header replay possible" → FP: header is authenticated by later MAC check
    action: "downgrade to false_positive unless call chain extends to final verification"

  - id: FP-LOCAL-FS-CONTROL
    name: "Local filesystem control mistaken for module vulnerability"
    description: >
      Threats that require local filesystem write access (e.g., modifying a DB
      file, replacing a binary, corrupting a data store) are NOT module vulnerabilities
      unless the threat model explicitly includes local attacker with FS access.
    rule: >
      If a threat requires modifying a file on the local filesystem to exploit,
      and the threat model does not include "local attacker with filesystem write access",
      classify as out_of_scope. These are OS-level or container-level concerns.
    examples:
      - "Attacker can modify local SQLite DB" → OOS: requires FS write, not a module vuln
      - "Binary can be replaced in /usr/bin" → OOS: system integrity concern
    action: "reclassify as oos unless threat model includes local FS attacker"

  - id: FP-DESIGN-AS-VULN
    name: "Design model difference mistaken for vulnerability"
    description: >
      Architecture design choices that differ from the reviewer's preferred model
      are not vulnerabilities. A design gap requires an exploit path to be classified
      as a vulnerability.
    rule: >
      If the threat describes a design approach that is different from an ideal model
      but does not demonstrate an actual exploit path, classify as design (not VULN).
      This includes: "uses X instead of Y", "does not implement Z standard",
      "would be stronger with W".
    examples:
      - "Uses AES-CBC instead of AES-GCM" → design unless padding oracle demonstrated
      - "No certificate pinning" → design unless MITM + bypass demonstrated
      - "Key stored in process memory" → design unless memory dump exploit shown
    action: "reclassify as design, set verification_level=partial"

  - id: FP-PROTOCOL-INTEGRITY
    name: "Protocol intermediate data mistaken for integrity boundary"
    description: >
      Intermediate protocol data formats (JSON, protobuf, XML) are transport encodings,
      not integrity boundaries. Threats based on "attacker modifying JSON field" that
      are actually protected by a later authentication or integrity layer (TLS, HMAC,
      signature) are false positives.
    rule: >
      If a tampering threat targets a protocol message field but the message is
      protected by TLS or an application-layer MAC/signature, verify that the
      protection is actually bypassable before classifying as a threat.
    examples:
      - "JSON user_id field can be changed" → FP if message is TLS-protected and server validates session
      - "Protobuf message field tamperable" → FP if authenticated channel
    action: "downgrade to false_positive if protected by authenticated channel"

  - id: FP-PSK-LENGTH
    name: "PSK length policy mistaken for auth bypass"
    description: >
      Pre-shared key length or entropy policy is a security hardening concern,
      not directly equivalent to authentication bypass. A short PSK still requires
      the attacker to know or brute-force the key.
    rule: >
      If a threat claims authentication bypass because a PSK is short (e.g., 4 bytes),
      verify whether brute-force is feasible within the protocol constraints
      (rate limits, connection costs, detection). If brute-force is impractical,
      classify as design/hardening, not VULN.
    examples:
      - "4-byte PSK allows brute-force" → design unless brute-force feasible within session timeout
      - "PSK derived from weak source" → design/hardening
    action: "classify as design if brute-force impractical; VULN only if demonstrable within protocol limits"

  - id: FP-INTERNAL-GUARD
    name: "Existing guard condition not checked"
    description: >
      Threats that claim a vulnerability exists but fail to check whether an
      existing guard condition in the source code already prevents the exploit.
      Common examples: count==0 early returns, NULL checks, range validation,
      error handling paths.
    rule: >
      Before confirming a threat, explicitly search the source code for guard
      conditions that would prevent the claimed exploit. Read the function
      start-to-finish. If a guard exists, note it in counter_evidence_checked.
    examples:
      - "HcFileRead infinite loop" → if readCount==0 check returns early, this is FP
      - "Buffer overflow at line N" → if bounds check at line N-3 protects, this is FP
    action: "check for existing guards; downgrade to false_positive if guard prevents exploit"

  - id: FP-INFERENCE-ONLY
    name: "Pure inference without source evidence"
    description: >
      Threats that are based solely on function names, variable names, or design
      assumptions without reading the actual source code implementation.
    rule: >
      If a threat does not reference a specific source file and line number where
      the vulnerability code exists, it is hypothesis-level (verification_level=hypothesis)
      and must NOT be classified as confirmed or HIGH/CRITICAL.
    examples:
      - "Function named writeData may have buffer overflow" → hypothesis
      - "This pattern is often vulnerable" → hypothesis without source check
    action: "cap at candidate, set verification_level=hypothesis, max severity=MEDIUM"

  - id: FP-UNREACHABLE-ENTRY
    name: "Unreachable entry point"
    description: >
      Threats that target functions which are never called from an external entry
      point. INTERNAL_ONLY functions without a reachable path from an entry point
      cannot be exploited.
    rule: >
      Verify the call chain from any ENTRY_POINT function to the vulnerable function.
      If no path exists through the call graph, classify as false_positive.
    examples:
      - "Internal helper vulnerable to buffer overflow" → if never called from entry, OOS
      - "Dead code has use-after-free" → FP, code is unreachable
    action: "classify as false_positive or oos if no reachable entry path"

  - id: FP-ROOT-REQUIRED
    name: "Exploit requires root or equivalent privilege"
    description: >
      Threats that require root access, kernel module loading, HUKS key compromise,
      or same-process arbitrary write to exploit are post-exploitation concerns,
      not vulnerabilities.
    rule: >
      If the exploitation precondition includes "attacker has root", "attacker has
      already compromised HUKS", "attacker can write to arbitrary process memory",
      the threat is a post-exploitation concern. Classify as oos or downgrade to design.
    examples:
      - "Root can read /data/service/keys" → OOS: root bypass is expected
      - "After compromising HUKS, keys extractable" → OOS: HUKS is root of trust
    action: "reclassify as oos or downgrade to design"

  - id: FP-SAME-SEVERITY-REPEAT
    name: "Same vulnerability pattern repeated across dimensions"
    description: >
      The same underlying vulnerability reported multiple times under different
      STRIDE dimensions (e.g., same buffer overflow as both Tampering and DoS).
      These should be consolidated.
    rule: >
      If two threats reference the same source file:line and describe the same
      underlying flaw, they should be merged into one entry with multiple
      STRIDE dimension tags, not duplicated.
    examples:
      - "Buffer overflow at line 100" reported as both Tampering and DoS → merge
      - "Missing auth at line 50" reported as Spoofing and EoP → merge
    action: "merge duplicates, keep the most specific classification"

  - id: FP-SENSITIVE-LOG-DESENSITIZATION
    name: "Sensitive data log has built-in sanitization"
    description: >
      PRINT_SENSITIVE_DATA only prints first 4 of N characters followed by '****'.
      PRINT_SENSITIVE_BYTE only prints first 2 bytes and last 2 bytes in hex.
      PRINT_DEBUG_MSG defaults to a no-op macro (requires DEV_AUTH_PRINT_DEBUG_MSG
      compile flag to be active). Threats claiming sensitive data leakage via these
      macros must account for the existing sanitization.
    rule: >
      Before confirming an information disclosure threat based on these macros:
      1. Check the macro definition in hc_log.h
      2. Verify how many characters/bytes are actually leaked (PRINT_SENSITIVE_DATA: 4 chars,
         PRINT_SENSITIVE_BYTE: 2+2 bytes)
      3. PRINT_DEBUG_MSG is disabled by default — check if DEV_AUTH_PRINT_DEBUG_MSG is defined
      4. If only 4/N characters are leaked from a 32+ byte key, the leakage is minimal
    examples:
      - "PSK value leaked via PRINT_SENSITIVE_DATA('pskValue', psk)" → 4/32 bytes leaked, minimal impact
      - "Ephemeral key leaked via PRINT_SENSITIVE_BYTE" → 4 bytes leaked, cannot recover key
      - "PRINT_DEBUG_MSG dumps full buffer" → disabled by default, requires debug build
    action: "downgrade severity to Low OR reclassify as false_positive if leakage is negligible"

  - id: FP-IPC-BOUNDS-EXIST
    name: "IPC deserialization has existing bounds checks"
    description: >
      The IPC deserialization functions in ipc_adapt.cpp and ipc_dev_auth_stub.cpp
      have multiple layers of bounds validation that are often overlooked by
      threat analysis.
    rule: >
      Before confirming an IPC tampering or DoS threat:
      1. Check ipc_dev_auth_stub.cpp DecodeCallRequest:
         - line 139: GetReadableBytes() > MAX_DATA_LEN
         - line 149: dataLen > GetReadableBytes()
         - line 159: inParamNum < 0 || inParamNum > cacheNum
      2. Check ipc_adapt.cpp DecodeIpcData:
         - line 1675: *valSz < 0 || *valSz > GetReadableBytes()
      3. If ALL these checks are present and the threat claims a bypass → FP
      4. If the threat targets something NOT covered by these checks → keep
    examples:
      - "IPC data length validation bypass at DecodeCallRequest" → FP: bounds checked at :139, :149, :159
      - "IPC valSz can cause out of bounds read" → FP: valSz bounded at :1675
      - "IPC type field unvalidated" → possible valid threat: type field NOT covered by bounds checks
    action: "check ALL existing bounds; if the claimed bypass is already guarded → false_positive"

  - id: FP-CRITICAL-COUNTER-BALANCED
    name: "Critical section counter increase/decrease is balanced"
    description: >
      Functions like IncreaseCriticalCnt and DecreaseCriticalCnt are used to
      protect critical sections. Threats claiming counter mismatch must verify
      ALL call sites of both functions (including in destructors and cleanup
      handlers), not just the push side.
    rule: >
      Before confirming a counter mismatch threat:
      1. Find ALL call sites of IncreaseCriticalCnt (including IncreaseCriticalCnt(ADD_TWO))
      2. Find ALL call sites of DecreaseCriticalCnt
      3. Verify pair balance: each push path's increase must have a corresponding
         decrease in BOTH the task function (Do*) AND the cleanup function (Destroy*)
      4. Common pattern: InitAndPush*Task calls IncreaseCriticalCnt(ADD_TWO),
         Do*Task calls DecreaseCriticalCnt() once,
         Destroy*Task calls DecreaseCriticalCnt() once → TOTAL: +2 -1 -1 = 0 (balanced)
    examples:
      - "GroupManager critical counter leaks: IncreaseCriticalCnt(ADD_TWO) but only one DecreaseCriticalCnt" →
        FP: the second DecreaseCriticalCnt is in DestroyGroupManagerTask (line 1844)
      - "Account lifecycle critical counter underflow" → possibly valid if Decrease called without matching Increase
    action: "trace ALL Increase/Decrease call sites; if balanced → false_positive"
