# ============================================================
# STRIDE Threat Templates — Per-dimension baseline patterns
# ============================================================

dimensions:
  Spoofing:
    description: "Threats related to identity forgery and authentication bypass"
    dfd_elements: [ExternalEntity, Process]
    template_threats:
      - pattern: "No authentication on {process_name}"
        example: "The {process} endpoint at {entry_point} accepts requests without verifying caller identity"
        severity_range: "Critical-High"
      - pattern: "Weak credential storage in {store_name}"
        example: "Passwords stored with fast hash ({algorithm}), susceptible to brute force"
        severity_range: "Critical-Medium"
      - pattern: "Token forgery risk at {process_name}"
        example: "JWT signed with weak secret or algorithm confusion possible at {entry_point}"
        severity_range: "High"

  Tampering:
    description: "Threats related to unauthorized data or code modification"
    dfd_elements: [DataFlow, Store, Process]
    template_threats:
      - pattern: "Data modified in transit between {from} and {to}"
        example: "No TLS on data flow {dataflow_id} from {from} to {to}"
        severity_range: "High-Medium"
      - pattern: "Injection attack at {process_name}"
        example: "{process_name} passes user input to {sink_function} without sanitization"
        severity_range: "Critical-Medium"
      - pattern: "Unauthorized write to {store_name}"
        example: "{store_name} accepts writes without proper authorization check"
        severity_range: "High-Medium"

  Repudiation:
    description: "Threats related to denying actions without proof"
    dfd_elements: [Process, DataFlow]
    template_threats:
      - pattern: "No audit log for critical action in {process_name}"
        example: "{process_name} performs {action} without creating an immutable audit record"
        severity_range: "High-Low"
      - pattern: "Log integrity risk in {process_name}"
        example: "Audit logs stored in {store_name} are writable by the same process, allowing log tampering"
        severity_range: "Medium-Low"

  Information_Disclosure:
    description: "Threats related to unauthorized data access"
    dfd_elements: [DataFlow, Store, TrustBoundary]
    template_threats:
      - pattern: "Sensitive data exposed in transit at {dataflow_id}"
        example: "{data_description} transmitted without encryption from {from} to {to}"
        severity_range: "Critical-High"
      - pattern: "Hardcoded secrets in {process_name}"
        example: "API key, password, or token found in source file {file}:{line}"
        severity_range: "Critical"
      - pattern: "Information leakage via error messages in {process_name}"
        example: "Stack traces or internal paths exposed to {external_entity}"
        severity_range: "Medium-Low"

  Denial_of_Service:
    description: "Threats related to service availability degradation"
    dfd_elements: [Process, ExternalEntity]
    template_threats:
      - pattern: "Resource exhaustion at {process_name}"
        example: "{process_name} allocates memory based on user-controlled size without bounds checking"
        severity_range: "High-Medium"
      - pattern: "No rate limiting on {process_name}"
        example: "{process_name} accepts unlimited requests from {external_entity}"
        severity_range: "Medium-Low"
      - pattern: "Single point of failure: {external_entity}"
        example: "{external_entity} is an external dependency with no fallback or circuit breaker"
        severity_range: "Medium"

  Elevation_of_Privilege:
    description: "Threats related to unauthorized privilege escalation"
    dfd_elements: [Process, TrustBoundary]
    template_threats:
      - pattern: "Missing authorization check in {process_name}"
        example: "{process_name} performs admin operation without verifying the caller's role"
        severity_range: "Critical-High"
      - pattern: "TOCTOU race condition in {process_name}"
        example: "{process_name} checks permission then performs action in separate non-atomic steps"
        severity_range: "High"
      - pattern: "Trust boundary crossing at {trustboundary_name}"
        example: "Data crossing {trustboundary_name} from {from_zone} to {to_zone} without re-validation"
        severity_range: "High-Medium"
