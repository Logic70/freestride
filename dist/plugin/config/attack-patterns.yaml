# ============================================================
# Attack Patterns Library — STRIDE-to-CAPEC Mappings
# Baseline v1, ~50 patterns covering all 6 STRIDE dimensions
# ============================================================

# Spoofing — Identity/Authentication threats
Spoofing:
  ExternalEntity:
    - caped_id: "CAPEC-16"
      name: "Dictionary-based Password Attack"
      indicators: ["no rate limiting", "no MFA", "weak password policy", "no account lockout"]
    - caped_id: "CAPEC-560"
      name: "Use of Known Credentials"
      indicators: ["default credentials", "hardcoded passwords", "credential stuffing possible"]
    - caped_id: "CAPEC-194"
      name: "Fake the Source of Data"
      indicators: ["no origin verification", "trusting client-provided data", "no signature validation"]
  Process:
    - caped_id: "CAPEC-461"
      name: "Web Services API Signature Forgery"
      indicators: ["weak JWT secret", "no token expiration", "algorithm=none attack"]
    - caped_id: "CAPEC-21"
      name: "Exploitation of Session Variables"
      indicators: ["predictable session IDs", "no session rotation", "cookie without Secure/HttpOnly"]

# Tampering — Data/State integrity threats
Tampering:
  DataFlow:
    - caped_id: "CAPEC-117"
      name: "Interception"
      indicators: ["no TLS/mutual TLS", "accepting self-signed certs", "downgrade attack possible"]
    - caped_id: "CAPEC-384"
      name: "Session Fixation"
      indicators: ["session ID in URL", "no session regeneration on login"]
    - caped_id: "CAPEC-240"
      name: "Resource Injection"
      indicators: ["unsanitized file paths", "XML external entity", "deserialization without type check"]
  Store:
    - caped_id: "CAPEC-75"
      name: "Buffer Overflow via Environment Variables"
      indicators: ["unbounded strcpy/strcat", "sprintf without length check", "alloca with user input"]
    - caped_id: "CAPEC-248"
      name: "Command Injection"
      indicators: ["system()/popen() with user input", "shell metacharacters not escaped", "exec() with unsanitized args"]
  Process:
    - custom: "SQL_INJECTION"
      name: "SQL Injection"
      indicators: ["string concatenation in SQL", "no prepared statements", "dynamic query building"]
    - custom: "XSS_VULNERABILITY"
      name: "Cross-Site Scripting"
      indicators: ["unescaped output in HTML", "innerHTML assignment", "no Content-Security-Policy"]

# Repudiation — Non-repudiation threats
Repudiation:
  Process:
    - caped_id: "CAPEC-93"
      name: "Log Injection/Forge"
      indicators: ["no log integrity protection", "log entries from user input", "missing audit trail"]
    - caped_id: "CAPEC-268"
      name: "Audit Log Manipulation"
      indicators: ["writable log files", "no log signing", "logs stored on same system"]
  DataFlow:
    - caped_id: "CAPEC-272"
      name: "Protocol Manipulation"
      indicators: ["no request signing", "no nonce/timestamp in messages", "replay attack possible"]

# Information Disclosure — Confidentiality threats
Information_Disclosure:
  DataFlow:
    - caped_id: "CAPEC-117"
      name: "Interception (Sniffing)"
      indicators: ["no TLS", "weak cipher suites", "TLS 1.0/1.1"]
    - caped_id: "CAPEC-169"
      name: "Footprinting"
      indicators: ["verbose error messages", "server version headers", "debug endpoints exposed"]
  Store:
    - caped_id: "CAPEC-37"
      name: "Retrieve Embedded Sensitive Data"
      indicators: ["hardcoded API keys", "secrets in config files", "credentials in source code"]
    - caped_id: "CAPEC-545"
      name: "Pull Data from System"
      indicators: ["no encryption at rest", "unprotected backups", "no access control on storage"]
  TrustBoundary:
    - caped_id: "CAPEC-497"
      name: "File Discovery"
      indicators: ["directory listing enabled", "predictable file paths", ".git accessible"]
    - custom: "LOG_LEAKAGE"
      name: "Sensitive Data in Logs"
      indicators: ["PII in log messages", "tokens/secrets logged", "request body logged"]

# Denial of Service — Availability threats
Denial_of_Service:
  Process:
    - caped_id: "CAPEC-469"
      name: "Resource Exhaustion"
      indicators: ["no connection limits", "unbounded memory allocation", "infinite loop risk"]
    - caped_id: "CAPEC-125"
      name: "Flooding"
      indicators: ["no rate limiting", "no request size limits", "synchronous I/O without timeouts"]
    - caped_id: "CAPEC-130"
      name: "Excessive Allocation"
      indicators: ["malloc() with user-controlled size", "no allocation caps", "recursive without depth limit"]
  ExternalEntity:
    - caped_id: "CAPEC-147"
      name: "API Flooding"
      indicators: ["no API rate limits", "no circuit breaker", "single point of failure"]

# Elevation of Privilege — Authorization threats
Elevation_of_Privilege:
  Process:
    - caped_id: "CAPEC-233"
      name: "Privilege Escalation"
      indicators: ["missing authorization check", "insecure direct object references", "TOCTOU race condition"]
    - caped_id: "CAPEC-122"
      name: "Privilege Abuse"
      indicators: ["no least privilege", "root/admin by default", "excessive file permissions"]
    - caped_id: "CAPEC-69"
      name: "Cross-Zone Scripting"
      indicators: ["mixed content", "relaxed CORS policy", "no sandbox attribute"]
  TrustBoundary:
    - caped_id: "CAPEC-81"
      name: "Web Logs Tampering"
      indicators: ["no input boundary validation", "trusted zone assumes clean input"]
    - custom: "SANDBOX_ESCAPE"
      name: "Sandbox/Container Escape"
      indicators: ["privileged container", "host filesystem mount", "capabilities not dropped"]
