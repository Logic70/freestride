# ============================================================
# STRIDE Validation Regression Corpus v2.1 (v0.5)
# Precision matching + semantic assertions + expanded must-reject
# ============================================================

must_detect_entries:
  - threat_id: "MUST-001"
    description: "Critical counter underflow: DecreaseCriticalCnt no lower bound"
    correct_classification: "confirmed_code_defect"
    matching:
      file_suffix: "critical_handler.cpp"
      function: "DecreaseCriticalCnt"
      line_range: [48, 56]
      bug_pattern: "integer_underflow_no_lower_bound"
      sink_operation: "subtraction_without_guard"
    semantic_assertions:
      - "finding MUST mention g_count type as int32_t"
      - "finding MUST mention g_count == 0 branch unreachable"
      - "finding MUST NOT claim uint32_t wrap-around (code uses int32_t)"

  - threat_id: "MUST-002"
    description: "Seed value not zeroed before free in identity_group.c"
    correct_classification: "confirmed_code_defect"
    matching:
      file_suffix: "identity_group.c"
      function: "GeneratePsk|AuthGeneratePsk"
      line_range: [540, 575]
      bug_pattern: "sensitive_data_not_cleared_before_free"
      sink_operation: "HcFree_without_prior_memset_s"
    semantic_assertions:
      - "finding MUST mention ClearFreeUint8Buff exists but unused"
      - "finding MUST reference identity_group.c line numbers"

  - threat_id: "MUST-003"
    description: "Account-related group membership bypass"
    correct_classification: "confirmed_code_defect"
    matching:
      file_suffix: "group_auth_data_operation.c"
      function: "GaIsDeviceInGroup"
      line_range: [185, 200]
      bug_pattern: "device_verification_bypass_for_account_groups"
      sink_operation: "unconditional_return_true"
    semantic_assertions:
      - "finding MUST mention AUTH_FORM_ACROSS_ACCOUNT and AUTH_FORM_IDENTICAL_ACCOUNT"
      - "finding MUST mention that P2P groups DO verify"

  - threat_id: "MUST-004"
    description: "Credential listener callback invoked under mutex"
    correct_classification: "confirmed_code_defect"
    matching:
      file_suffix: "cred_listener.c"
      function: "OnCredAdd|OnCredDelete|OnCredUpdate"
      line_range: [36, 55]
      bug_pattern: "callback_under_lock_deadlock_risk"
      sink_operation: "LockHcMutex_followed_by_external_callback"
    semantic_assertions:
      - "finding MUST describe re-entrancy deadlock path"
      - "finding MUST mention LockHcMutex by name"

  - threat_id: "MUST-005"
    description: "Task queue has no capacity limit"
    correct_classification: "confirmed_code_defect"
    matching:
      file_suffix: "hc_task_thread.c"
      function: "PushTask"
      line_range: [40, 55]
      bug_pattern: "unbounded_vector_pushback"
      sink_operation: "pushBack_without_capacity_check"

  - threat_id: "MUST-006"
    description: "Global session slots have no per-source limit"
    correct_classification: "confirmed_code_defect"
    matching:
      file_suffix: "dev_session_mgr.c"
      function: "CheckEnvForOpenSession"
      line_range: [86, 101]
      bug_pattern: "global_only_limit_no_per_source_cap"
      sink_operation: "curSessionNum_check_against_global_max_only"
    semantic_assertions:
      - "finding MUST mention MAX_AUTH_SESSION_COUNT=10"
      - "finding MUST mention no per-appId/per-UID limit"

  - threat_id: "MUST-007"
    description: "KeyAgree sessionKey.length + 1 used as copy size"
    correct_classification: "partial"
    matching:
      file_suffix: "key_agree_sdk.c"
      function: "ProcessTransmitCallback"
      line_range: [285, 300]
      bug_pattern: "length_plus_one_copy_size"
      sink_operation: "memcpy_s_with_length_plus_one"
      sink_function: "memcpy_s"
    semantic_assertions:
      - "finding MUST mention key_agree_sdk.c in file field"
      - "finding MUST mention memcpy_s in description"
      - "finding MUST mention length + 1 pattern"

# ============================================================
# must-reject v2.1 — expanded patterns (v0.5)
# ============================================================
must_reject_patterns:
  - pattern_id: "REJECT-001"
    description: "IPC no permission check claim"
    trigger:
      finding_keywords: ["no IPC permission", "IPC缺少权限", "IPC 无权限", "IPC no permission check", "无需权限检查"]
      guard_location:
        file: "frameworks/src/standard/ipc_dev_auth_stub.cpp"
        line: 277
        code: "ret = CheckPermission(methodId);"
    action:
      force_classification: "false_positive"
      fp_code_ref: "REJECT-001"

  - pattern_id: "REJECT-002"
    description: "Credential export no authentication claim"
    trigger:
      finding_keywords: ["credential export", "no auth", "未认证"]
      guard_location:
        file: "services/identity_service/src/identity_service_impl.c"
        line: 93
        code: "ret = CheckOwnerUidPermission(credential);"
    action:
      force_classification: "false_positive"
      fp_code_ref: "REJECT-002"

  - pattern_id: "REJECT-003"
    description: "PRINT_SENSITIVE_DATA log leakage claim"
    trigger:
      finding_keywords: ["PRINT_SENSITIVE_DATA", "log leak", "日志泄露"]
      guard_location:
        file: "deps_adapter/os_adapter/interfaces/linux/hc_log.h"
        line: 30
        code: "PRINT_SENSITIVE_DATA only outputs 4 chars + ****"
    action:
      force_classification: "false_positive"
      fp_code_ref: "REJECT-003"

  # === v0.5 NEW PATTERNS ===

  - pattern_id: "REJECT-005"
    description: "PIN bit-length misread — 6 characters ≠ 6 bits"
    trigger:
      finding_keywords: ["6bit", "6 bit", "64 种", "64 values", "PIN码", "PIN length"]
    validation:
      check_source_code: true
      expected_pattern: "HcStrlen\\(pinCode\\) >= 6"
      note: "6 in HcStrlen >= 6 means 6 CHARACTERS (~48 bits for alphanumeric), NOT 6 bits"
    action:
      force_classification: "false_positive"
      fp_code_ref: "REJECT-005"
      fp_rationale: "HcStrlen(pinCode) >= 6 checks string length of 6 CHARACTERS, not 6 bits. Even at 1 byte per char, that's 48 bits minimum, giving 2.8e14 combinations — not 64. PIN brute force claim based on bit/char confusion is a false positive."

  - pattern_id: "REJECT-006"
    description: "Local filesystem design risk elevated to confirmed vulnerability"
    trigger:
      finding_keywords: ["plaintext", "明文", "encryption at rest", "文件加密", "未加密", "integrity protect", "完整性"]
      finding_file_pattern: "data_manager|group_data_manager|cred_data_manager"
    validation:
      check_attacker_model: true
      required_capability: "local_filesystem_read OR local_filesystem_write"
    action:
      force_classification: "design"
      fp_code_ref: "REJECT-006"
      fp_rationale: "Threat requires local filesystem access. Under default attacker model (mobile_device_remote_attacker), this capability is FALSE. Classified as design — not exploitable without local FS access."

  - pattern_id: "REJECT-007"
    description: "Simulation PoC claimed as full vulnerability verification"
    trigger:
      poc_type: "runtime_model_poc"
      observation_contains: ["fully verified", "exploit confirmed", "漏洞已验证", "PoC有效验证漏洞", "PoC 有效验证"]
    action:
      force_claim_rewrite: true
      allowed_claim: "漏洞机制经独立模拟确认成立。未调用目标代码，不能作为可利用性证据。"
      fp_code_ref: "REJECT-007"
      note: "Not a false positive on the defect, but a false positive on the VERIFICATION CLAIM"

  - pattern_id: "REJECT-008"
    description: "Static evidence supporting HIGH severity confirmed"
    trigger:
      poc_type: "static_evidence"
      severity: "HIGH"
      final_classification: ["confirmed_exploitable", "confirmed_code_defect"]
    action:
      force_downgrade: true
      new_severity: "MEDIUM"
      fp_code_ref: "REJECT-008"
      fp_rationale: "Static evidence cannot support HIGH severity. HIGH requires runtime_target_poc or direct exploit path demonstrated on target code."

  - pattern_id: "REJECT-009"
    description: "Design-only exploit path claimed as confirmed"
    trigger:
      exploit_path_type: "design_only"
      final_classification: ["confirmed_exploitable", "confirmed_code_defect", "confirmed"]
    action:
      force_classification: "design"
      fp_code_ref: "REJECT-009"

# ============================================================
# Matching rules (v0.5 — semantic assertions added)
# ============================================================
matching_rules:
  must_detect_verification:
    - "1. file ENDSWITH matching.file_suffix"
    - "2. line IN matching.line_range"
    - "3. finding contains matching.sink_operation OR matching.bug_pattern"
    - "4. ALL semantic_assertions pass (if present)"
    - "If ANY condition fails → must_detect_miss → HARD FAIL"

  must_reject_verification:
    - "1. finding.(name+description+observation) CONTAINS trigger.finding_keywords"
    - "2. If trigger.guard_location: verify guard exists in target code"
    - "3. If trigger.validation.check_attacker_model: verify attacker lacks required capability"
    - "4. Apply action: force classification/severity/claim"
    - "5. Record in result_audit.must_reject_applications"
