# ============================================================
# Confirmed Classification Hard Gates (v0.5)
# Two-tier confirmed: confirmed_code_defect / confirmed_exploitable
# ============================================================

version: "0.5.0"

# Required fields for every confirmed threat
required_fields:
  - attacker_control
  - preconditions
  - exploit_path_type
  - impact_observed
  - poc_type
  - confirmed_tier   # NEW v0.5: confirmed_code_defect | confirmed_exploitable

# ============================================================
# Two-Tier Confirmed Classification (v0.5)
# ============================================================
confirmed_tiers:
  confirmed_exploitable:
    description: "漏洞可被真实利用，证据链完整"
    requirements:
      exploit_path_type: "direct"
      poc_type: "runtime_target_poc"
      impact_observed: true
    max_severity: "HIGH"
    notes: "只有此级别可以写 '漏洞已验证 / exploit confirmed'"

  confirmed_code_defect:
    description: "代码缺陷确认存在，但可利用性未在目标代码上验证"
    requirements:
      exploit_path_type: ["direct", "conditional"]
      poc_type: ["runtime_model_poc", "static_evidence"]
    max_severity: "MEDIUM"
    notes: "只能写 '代码缺陷确认 / code defect confirmed'。不可声明 '漏洞已验证'。"

# ============================================================
# Hard Gates (v0.5 strengthened)
# ============================================================
gates:
  - id: GATE-PRECONDITION-PRIVILEGE
    rule: >
      IF preconditions INTERSECTS [root, local_fs_write, system_partition_write]
      THEN fail("Cannot be confirmed: requires elevated attacker privilege")
      ACTION: downgrade to partial (conditional) or design (if exceeds model)
    severity: HARD

  - id: GATE-EXPLOIT-PATH
    rule: >
      IF exploit_path_type == design_only THEN downgrade to design.
      IF exploit_path_type == simulated_only THEN downgrade to partial.
      IF exploit_path_type == conditional AND confirmed_tier == confirmed_exploitable
      THEN fail("conditional path cannot be confirmed_exploitable")
      ACTION: downgrade confirmed_exploitable→confirmed_code_defect
    severity: HARD

  - id: GATE-POC-LEVEL-V05
    rule: >
      static_evidence → max severity MEDIUM, max tier confirmed_code_defect.
      runtime_model_poc → cannot claim "漏洞已验证", cannot be confirmed_exploitable.
      design_scenario → CANNOT be confirmed at all, force design.
      runtime_target_poc → only path to confirmed_exploitable.
    severity: HARD

  - id: GATE-STATIC-EVIDENCE-HIGH
    rule: >
      IF poc_type == static_evidence AND severity == HIGH
      THEN fail("static_evidence cannot support HIGH severity")
      ACTION: WARN in v0.4 → HARD FAIL in v0.5
    severity: HARD  # upgraded from SOFT_WARN in v0.4

  - id: GATE-SIMULATION-CLAIMS
    rule: >
      IF poc_type == runtime_model_poc AND observation CONTAINS ["fully verified", "漏洞已验证", "exploit confirmed"]
      THEN fail("simulation PoC cannot claim full verification")
      ACTION: force observation rewrite
    severity: HARD

  - id: GATE-ATTACKER-CONTROL
    rule: >
      IF attacker_control == none THEN cannot be confirmed. Downgrade to design.
    severity: HARD

  - id: GATE-CONFIRMED-WITHOUT-POC
    rule: >
      IF confirmed AND no PoC entry AND no why_confirmed_without_poc
      THEN fail("missing justification")
      ACTION: add why_confirmed_without_poc or downgrade
    severity: HARD

# ============================================================
# Confidence caps by evidence type (v0.5)
# ============================================================
confidence_caps:
  runtime_target_poc: 10
  runtime_model_poc: 7
  static_evidence: 5
  design_scenario: 3
  none: 2

max_severity_by_poc:
  runtime_target_poc: "HIGH"
  runtime_model_poc: "MEDIUM"
  static_evidence: "MEDIUM"
  design_scenario: "N/A (cannot be confirmed)"
